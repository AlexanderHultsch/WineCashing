<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Wine Caching — Geocaching mit Weinflaschen für den Freundeskreis." />
    <meta name="theme-color" content="#f6f4ef" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#17130f" media="(prefers-color-scheme: dark)" />
    <title>Wine Caching</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <!-- Klassisches Script (kein type=module) -> läuft synchron, bevor unser Modul unten
         startet. Dadurch ist das globale `L` garantiert vorhanden. Selbst gehostet
         (public/vendor/leaflet/), keine externe CDN-Abhängigkeit zur Laufzeit. -->
    <script src="vendor/leaflet/leaflet.js"></script>
  </head>
  <body>
    <main class="app" id="app">
      <noscript><p class="error">Diese Seite benötigt JavaScript — bitte im Browser aktivieren.</p></noscript>
    </main>

    <!-- Karten-Auswahl-Overlay: bewusst AUSSERHALB von #app, damit es beim Neu-Rendern
         der App (innerHTML-Ersetzung) nicht mit-zerstört wird und die Leaflet-Karteninstanz
         über mehrere Öffnungen hinweg erhalten bleibt. -->
    <div id="map-overlay" class="map-overlay hidden">
      <div class="map-overlay-inner">
        <div id="map-picker" class="map-picker"></div>
        <p class="muted" id="map-picker-coords" style="margin-top: 8px">Punkt auf der Karte antippen …</p>
        <div class="row wrap" style="margin-top: 8px">
          <button type="button" class="primary block" id="map-picker-confirm">Bestätigen</button>
          <button type="button" class="ghost block" id="map-picker-cancel">Abbrechen</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { api } from './js/api.js';
      import * as geolocation from './js/geolocation.js';
      import { formatDms } from './js/coordinates.js';
      import { openMapPicker, getMapPickerPosition, moveMapPickerTo } from './js/mapPicker.js';
      import { renderNavHtml, wireNavToggle } from './js/nav.js';
      import { copyToClipboard } from './js/clipboard.js';
      import { SITE_NAME, SITE_TAGLINE, LOGO_EMOJI, DEFAULT_MAP_CENTER } from './js/config.js';
      import { deriveRouteDisplayStatus, ROUTE_DISPLAY_STATUS_META } from './js/routeStatus.js';

      const app = document.getElementById('app');
      const S = {
        screen: 'landing', // landing | auth | routes | route
        authMode: 'login',
        user: null,
        routes: [],
        route: null,
        error: '',
        info: '',
        progress: null, // RouteProgress der offenen Route (nur fürs "Abgeschlossen"-Badge, Bug 3)
        wpDraft: null, // { name, hint, lat, lng } — überlebt Fehler-Re-Renders
        admin: null, // { routes, users } — nur geladen, wenn is_admin (Frage 6)
      };

      const esc = (s) =>
        String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
      // Abgeleiteter Tri-State (Bugs 1/3/5): ersetzt die frühere getrennte Anzeige von
      // route.status und route_code_active, die widersprüchlich wirken konnte (z. B.
      // "Route aktiv", obwohl der Code deaktiviert war).
      const displayStatusBadge = (route) => {
        const s = deriveRouteDisplayStatus(route);
        const meta = ROUTE_DISPLAY_STATUS_META[s];
        return `<span class="badge ${meta.badgeClass}">${meta.label}</span>`;
      };

      async function guard(fn) {
        try {
          S.error = '';
          S.info = '';
          await fn();
        } catch (e) {
          // Review-Fix: Wurde die gerade geöffnete Route zwischenzeitlich fremd gelöscht
          // (z. B. von einem Admin), würde jede weitere Aktion in derselben Ansicht wieder
          // an genau demselben 404/401 scheitern — automatisch zur Routenliste zurück,
          // statt den Nutzer in einer Fehlerschleife auf einer toten Route festzuhalten.
          if (S.screen === 'route' && (e.code === 'NOT_FOUND' || e.code === 'UNAUTHENTICATED')) {
            S.error = 'Diese Route ist nicht mehr verfügbar.';
            await loadRoutes();
            return;
          }
          S.error = e.message || 'Fehler';
          render();
        }
      }

      // Häufigstes Muster: API-Aufruf auf der offenen Route, danach neu laden.
      const call = (fn) =>
        guard(async () => {
          await fn();
          await refreshRoute();
        });

      // Session prüfen und je nach Ergebnis in die Routenliste oder den Login verzweigen.
      // Genutzt von der Landing-Kachel UND vom Login-Menüpunkt.
      async function enterOwnerArea() {
        try {
          const me = await api.me();
          S.user = me.user;
          await loadRoutes();
        } catch {
          S.user = null;
          S.screen = 'auth';
          render();
        }
      }

      // --- Datenlader ---
      async function loadRoutes() {
        S.routes = await api.listRoutes();
        S.route = null;
        S.screen = 'routes';
        render();
      }
      // EIN Fetch liefert Route + Progress zusammen (GET /:routeId, Review-Fix): zwei
      // getrennte awaits hätten sich bei überlappenden Aufrufen (schnelles Doppel-Öffnen)
      // zeitlich verschränken und Route/Progress aus zwei unterschiedlichen Antworten
      // mischen können.
      async function openRoute(id) {
        const route = await api.getRoute(id);
        S.route = route;
        S.progress = route.progress;
        S.wpDraft = null;
        S.screen = 'route';
        render();
      }
      async function refreshRoute() {
        const route = await api.getRoute(S.route.id);
        S.route = route;
        S.progress = route.progress;
        render();
      }
      async function loadAdmin() {
        const [routes, users] = await Promise.all([api.adminListRoutes(), api.adminListUsers()]);
        S.admin = { routes, users };
        S.screen = 'admin';
        render();
      }
      async function refreshAdmin() {
        const [routes, users] = await Promise.all([api.adminListRoutes(), api.adminListUsers()]);
        S.admin = { routes, users };
        render();
      }

      // --- Wegpunkt-Formular: Name/Hinweis aus dem DOM lesen, Position im State halten.
      // Vor jeder Aktion aufgerufen, damit Werte einen Fehler-Re-Render überleben.
      function snapshotWpDraft() {
        S.wpDraft = {
          name: document.getElementById('wp-name')?.value ?? '',
          hint: document.getElementById('wp-hint')?.value ?? '',
          lat: S.wpDraft?.lat ?? null,
          lng: S.wpDraft?.lng ?? null,
        };
      }

      // Frage 2: ohne vorherigen "Aktuellen Standort verwenden"-Klick landete die Karte
      // stumpf auf DEFAULT_MAP_CENTER (Mitte Deutschlands) — "mitten im Nirgendwo". Priorität
      // für den Startpunkt: laufende Auswahl > letzter Wegpunkt dieser Route (Flaschen liegen
      // meist nah beieinander) > eigener Standort (automatisch angefragt) > Deutschland-Default.
      function showMapOverlay() {
        document.getElementById('map-overlay').classList.remove('hidden');
        const lastWp = S.route?.waypoints?.length ? S.route.waypoints[S.route.waypoints.length - 1] : null;
        const hasKnownStart = S.wpDraft?.lat != null || !!lastWp;
        const start = S.wpDraft?.lat != null ? { lat: S.wpDraft.lat, lng: S.wpDraft.lng } : lastWp ? { lat: lastWp.lat, lng: lastWp.lng } : DEFAULT_MAP_CENTER;

        const coordsEl = () => document.getElementById('map-picker-coords');
        // Token identifiziert diese Öffnungs-Sitzung (Review-Fix): wird die Karte erneut
        // geöffnet (z. B. für einen anderen Wegpunkt), bevor eine der beiden Geolocation-
        // Anfragen unten aufgelöst hat, verwirft moveMapPickerTo() den veralteten Aufruf
        // anhand dieses Tokens, statt den Marker eines längst anderen Kontexts zu verschieben.
        const token = openMapPicker('map-picker', {
          startLat: start.lat,
          startLng: start.lng,
          onMove: (lat, lng) => {
            coordsEl().textContent = `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
          },
          onLocateRequest: async () => {
            try {
              const s = await geolocation.requestLocationPermission();
              moveMapPickerTo(s.lat, s.lng, token);
            } catch {
              coordsEl().textContent = 'Standort nicht verfügbar — bitte Karte manuell verschieben.';
            }
          },
        });

        // Kein bekannter Startpunkt -> automatisch den eigenen Standort versuchen (still,
        // ohne die Karte zu blockieren). Schlägt das fehl (verweigert/Timeout), bleibt der
        // synchrone Default (letzter Wegpunkt oder Deutschland) bestehen. `silent: true`
        // sorgt zusätzlich dafür, dass eine spät auflösende Anfrage eine zwischenzeitliche
        // manuelle Positionswahl des Nutzers nicht mehr überschreibt (Review-Fix).
        if (!hasKnownStart) {
          geolocation
            .requestLocationPermission()
            .then((s) => moveMapPickerTo(s.lat, s.lng, token, { silent: true }))
            .catch(() => {
              /* Standort nicht verfügbar: Default-Zentrum bleibt, Locate-Button bleibt nutzbar */
            });
        }
      }
      function hideMapOverlay() {
        document.getElementById('map-overlay').classList.add('hidden');
      }
      document.getElementById('map-picker-cancel').addEventListener('click', hideMapOverlay);
      document.getElementById('map-picker-confirm').addEventListener('click', () => {
        const { lat, lng } = getMapPickerPosition();
        S.wpDraft = { ...(S.wpDraft ?? { name: '', hint: '' }), lat, lng };
        hideMapOverlay();
        render();
      });

      // --- Views ---
      function viewNav() {
        return renderNavHtml({
          active: S.screen === 'admin' ? 'admin' : 'create',
          user: S.user?.username ?? null,
          isAdmin: !!S.user?.is_admin,
        });
      }

      function viewLanding() {
        return `
          <div class="stack center">
            <h1>${LOGO_EMOJI} ${esc(SITE_NAME)}</h1>
            <p class="muted">${esc(SITE_TAGLINE)}</p>
          </div>
          <div class="card stack">
            <button class="primary block" data-action="enter-owner">🍾 Route erstellen (Ersteller)</button>
            <p class="muted" style="font-size:.82rem">Login/Registrierung nötig — du versteckst Flaschen, legst Wegpunkte an und teilst einen Code.</p>
          </div>
          <div class="card stack">
            <a class="accent block" style="text-decoration:none; text-align:center" href="search.html">🔍 Mitsuchen</a>
            <p class="muted" style="font-size:.82rem">Kein Konto nötig — gib einfach den Routen-Code ein, den du bekommen hast.</p>
          </div>
          ${S.error ? `<p class="error">${esc(S.error)}</p>` : ''}`;
      }

      // Echtes <form>: Enter-Taste sendet ab, Passwort-Manager erkennen die Felder zuverlässig.
      // Mode-/Zurück-Buttons brauchen deshalb type="button", sonst würden sie das Formular absenden.
      function viewAuth() {
        const isLogin = S.authMode === 'login';
        return `
          <h1>${isLogin ? 'Login' : 'Registrieren'}</h1>
          <p class="muted">Melde dich an, um Routen anzulegen und Weinflaschen zu verstecken.</p>
          <form id="auth-form" class="card stack">
            <div class="row">
              <button type="button" class="${isLogin ? 'primary' : 'ghost'} block" data-action="mode-login">Login</button>
              <button type="button" class="${!isLogin ? 'primary' : 'ghost'} block" data-action="mode-register">Registrieren</button>
            </div>
            <div class="field"><label for="username">Benutzername</label><input id="username" name="username" required minlength="3" maxlength="32" autocomplete="username" /></div>
            <div class="field"><label for="password">Passwort${isLogin ? '' : ' (mind. 6 Zeichen)'}</label><input id="password" name="password" type="password" required ${isLogin ? '' : 'minlength="6"'} autocomplete="${isLogin ? 'current-password' : 'new-password'}" /></div>
            <button type="submit" class="primary block" data-action="submit-auth">${isLogin ? 'Einloggen' : 'Konto erstellen'}</button>
            <button type="button" class="ghost block" data-action="goto-landing">← Zurück</button>
            ${S.error ? `<p class="error" role="alert">${esc(S.error)}</p>` : ''}
          </form>`;
      }

      function viewRoutes() {
        const items =
          S.routes.length === 0
            ? '<p class="muted">Noch keine Routen. Leg deine erste an!</p>'
            : `<ul class="list">${S.routes
                .map(
                  (r) => `<li>
                    <span><strong>${esc(r.name)}</strong> ${displayStatusBadge(r)}</span>
                    <button class="ghost small" data-action="open" data-id="${r.id}">Öffnen</button>
                  </li>`,
                )
                .join('')}</ul>`;
        return `
          <h1>Meine Routen</h1>
          <div class="card stack">${items}</div>
          <form id="new-route-form" class="card stack">
            <div class="field"><label for="new-route-name">Neue Route</label><input id="new-route-name" required maxlength="120" placeholder="z. B. Sommerfest-Runde" /></div>
            <button type="submit" class="primary block" data-action="create-route">Route anlegen</button>
          </form>
          ${S.error ? `<p class="error" role="alert">${esc(S.error)}</p>` : ''}`;
      }

      function viewRoute() {
        const r = S.route;
        const wps = r.waypoints;
        const wpList =
          wps.length === 0
            ? '<p class="muted">Noch keine Wegpunkte.</p>'
            : `<ul class="list">${wps
                .map(
                  (w, i) => `<li>
                    <span>
                      <strong>${i + 1}. ${esc(w.name || 'Wegpunkt')}</strong><br />
                      <span class="muted">${esc(w.hint_text)}</span><br />
                      <span class="muted" style="font-size:.78rem">${w.lat.toFixed(5)}, ${w.lng.toFixed(5)}
                        (${formatDms(w.lat, true)} ${formatDms(w.lng, false)})</span>
                    </span>
                    <span class="row">
                      <button class="ghost small" data-action="wp-up" data-id="${w.id}" ${i === 0 ? 'disabled' : ''}>↑</button>
                      <button class="ghost small" data-action="wp-down" data-id="${w.id}" ${i === wps.length - 1 ? 'disabled' : ''}>↓</button>
                      <button class="danger small" data-action="wp-del" data-id="${w.id}">✕</button>
                    </span>
                  </li>`,
                )
                .join('')}</ul>`;

        const code = r.route_code;
        // Ob der Code Mitsucher tatsächlich reinlässt, steuert jetzt ausschließlich der
        // Umschalter in "Routen-Steuerung" (Bug 1/5) — hier nur noch Code + Kopieren +
        // Neuer Code + Zum-Mitsuchen (Bug 1/2), keine eigene Aktivieren/Deaktivieren-Logik.
        const codeSection = code
          ? `<div class="row wrap">
               <span class="code">${esc(code)}</span>
               <button type="button" class="ghost small" data-action="copy-code">📋 Kopieren</button>
             </div>
             <p class="muted">Code zum Beitreten für Mitsucher.</p>
             <div class="row wrap">
               <button class="ghost small" data-action="code-renew">Neuer Code</button>
               <a class="accent small" href="search.html">🔍 Zum Mitsuchen</a>
             </div>`
          : `<p class="muted">Noch kein Code (ältere Route). Erzeuge einen, um Mitsucher einzuladen.</p>
             <button class="ghost small" data-action="code-create">Code erzeugen</button>`;

        const d = S.wpDraft || {};
        const positionLine =
          d.lat != null
            ? `<p class="info">📍 Position übernommen: ${d.lat.toFixed(5)}, ${d.lng.toFixed(5)}
                (${formatDms(d.lat, true)} ${formatDms(d.lng, false)})</p>`
            : `<p class="muted">Noch keine Position gewählt.</p>`;

        // Tri-State-Umschalter (Bugs 1/3/5): EIN Button führt durch
        // Erstellung -> Aktiv -> Deaktiviert -> Aktiv, statt getrennter, teils toter
        // Buttons für status und route_code_active.
        const displayStatus = deriveRouteDisplayStatus(r);
        const completed = !!S.progress?.completed_at;
        const controlButton = {
          erstellung: `<button class="accent block" data-action="start">Route aktivieren</button>`,
          aktiv: `<button class="danger block" data-action="code-deactivate">Route deaktivieren</button>`,
          deaktiviert: `<button class="accent block" data-action="code-activate">Route wieder aktivieren</button>`,
        }[displayStatus];
        // Review-Fix: solange die Route noch in Erstellung ist, zeigt der Tri-State immer
        // "Erstellung" (unabhängig von route_code_active) — ohne diesen Zusatz-Umschalter
        // hätte der Owner keine Möglichkeit mehr, den ab Anlage automatisch aktiven Code
        // schon VOR dem Start zu sperren (frühere codeSection konnte das unabhängig vom
        // Routenstatus).
        const codeLockToggle =
          displayStatus === 'erstellung'
            ? `<div class="row wrap">
                 <span class="badge ${r.route_code_active ? 'on' : 'off'}">Code ${r.route_code_active ? 'aktiv' : 'gesperrt'}</span>
                 ${
                   r.route_code_active
                     ? '<button class="ghost small" data-action="code-deactivate">Code sperren</button>'
                     : '<button class="ghost small" data-action="code-activate">Code entsperren</button>'
                 }
               </div>`
            : '';

        return `
          <div class="row">
            <button class="ghost small" data-action="back">← Zurück</button>
          </div>
          <h1>${esc(r.name)}</h1>

          <div class="card stack">
            <h3>Wegpunkte</h3>
            ${wpList}
          </div>

          <div class="card stack">
            <h3>Wegpunkt hinzufügen</h3>
            <div class="field"><label>Name (optional)</label><input id="wp-name" placeholder="z. B. Alte Eiche" value="${esc(d.name)}" /></div>
            <div class="field"><label>Hinweis</label><input id="wp-hint" placeholder="z. B. hinter dem dritten Stein" value="${esc(d.hint)}" /></div>

            <div class="field">
              <label>Position</label>
              <div class="row wrap">
                <button type="button" class="ghost" data-action="use-location">📍 Aktuellen Standort verwenden</button>
                <button type="button" class="ghost" data-action="open-map-picker">🗺️ Punkt auf Karte auswählen</button>
              </div>
              ${positionLine}
            </div>

            <button class="primary block" data-action="wp-add">Hinzufügen</button>
          </div>

          <div class="card stack">
            <h3>Routen-Code</h3>
            ${codeSection}
          </div>

          <div class="card stack">
            <h3>Routen-Steuerung</h3>
            <div class="row wrap">
              ${displayStatusBadge(r)}
              ${completed ? '<span class="badge on">✅ Abgeschlossen</span>' : ''}
            </div>
            ${codeLockToggle}
            <div class="row wrap">
              ${controlButton}
              <button class="ghost block" data-action="reset">Zurücksetzen</button>
            </div>
            <button class="danger" data-action="delete-route">Route löschen</button>
          </div>
          ${S.info ? `<p class="info">${esc(S.info)}</p>` : ''}
          ${S.error ? `<p class="error">${esc(S.error)}</p>` : ''}`;
      }

      // Admin-Panel (Frage 6): volle Übersicht über ALLE Routen/Nutzer, nicht nur die
      // eigenen. Getrennte Endpunkte (/api/admin/*), damit die Owner-Isolation der
      // normalen Routen-Endpunkte unangetastet bleibt.
      function viewAdmin() {
        const { routes, users } = S.admin;
        const routeRows = routes.length
          ? routes
              .map(
                (r) => `<tr>
                  <td>${esc(r.name)}</td>
                  <td>${esc(r.owner_username)}</td>
                  <td>${displayStatusBadge(r)}</td>
                  <td class="muted" style="font-size:.78rem">${esc(r.route_code || '—')}</td>
                  <td>
                    <div class="row wrap">
                      <button class="ghost small" data-action="admin-code-renew" data-id="${r.id}">Neuer Code</button>
                      ${
                        r.route_code_active
                          ? `<button class="ghost small" data-action="admin-code-deactivate" data-id="${r.id}">Deaktivieren</button>`
                          : `<button class="ghost small" data-action="admin-code-activate" data-id="${r.id}">Aktivieren</button>`
                      }
                      <button class="danger small" data-action="admin-route-delete" data-id="${r.id}">Löschen</button>
                    </div>
                  </td>
                </tr>`,
              )
              .join('')
          : `<tr><td colspan="5" class="muted">Keine Routen vorhanden.</td></tr>`;

        const userRows = users
          .map(
            (u) => `<tr>
              <td>${esc(u.username)}${u.is_admin ? ' <span class="badge on">Admin</span>' : ''}</td>
              <td>${u.route_count}</td>
              <td>${u.id === S.user.id ? '<span class="muted">(du)</span>' : `<button class="danger small" data-action="admin-user-delete" data-id="${u.id}">Löschen</button>`}</td>
            </tr>`,
          )
          .join('');

        return `
          <div class="row"><button class="ghost small" data-action="back">← Zurück</button></div>
          <h1>⚙️ Admin</h1>

          <div class="card stack">
            <h3>Alle Routen (${routes.length})</h3>
            <div style="overflow-x:auto">
              <table class="admin-table">
                <thead><tr><th>Name</th><th>Ersteller</th><th>Status</th><th>Code</th><th>Aktionen</th></tr></thead>
                <tbody>${routeRows}</tbody>
              </table>
            </div>
          </div>

          <div class="card stack">
            <h3>Alle Nutzer (${users.length})</h3>
            <div style="overflow-x:auto">
              <table class="admin-table">
                <thead><tr><th>Nutzername</th><th>Routen</th><th>Aktionen</th></tr></thead>
                <tbody>${userRows}</tbody>
              </table>
            </div>
          </div>
          ${S.info ? `<p class="info">${esc(S.info)}</p>` : ''}
          ${S.error ? `<p class="error">${esc(S.error)}</p>` : ''}`;
      }

      function render() {
        if (S.screen === 'loading') {
          app.innerHTML = '<p class="muted">Lädt …</p>';
          return;
        }
        let body = '';
        if (S.screen === 'landing') body = viewLanding();
        else if (S.screen === 'auth') body = viewAuth();
        else if (S.screen === 'routes') body = viewRoutes();
        else if (S.screen === 'route') body = viewRoute();
        else if (S.screen === 'admin') body = viewAdmin();
        app.innerHTML = viewNav() + body;
        wireNavToggle();
      }

      // Echte <form>-Elemente (Login, neue Route) senden bei Enter ein natives 'submit'-Event,
      // das sonst die Seite per GET neu lädt und den kompletten SPA-Zustand verwirft. Der Klick
      // auf den type="submit"-Button feuert (auch bei Enter, per HTML-Spec) trotzdem ganz normal
      // weiter und wird von der Click-Delegation unten wie gehabt verarbeitet.
      app.addEventListener('submit', (e) => e.preventDefault());

      // --- Aktionen (Event-Delegation) ---
      app.addEventListener('click', (e) => {
        const navBtn = e.target.closest('[data-nav]');
        if (navBtn) {
          const kind = navBtn.dataset.nav;
          if (kind === 'login') guard(enterOwnerArea);
          else if (kind === 'logout')
            guard(async () => {
              await api.logout();
              S.user = null;
              S.screen = 'landing';
              render();
            });
          else if (kind === 'create') {
            // Schon auf index.html: kein Seiten-Reload, direkt in den Owner-Bereich springen.
            e.preventDefault();
            guard(enterOwnerArea);
          } else if (kind === 'admin') {
            // Schon auf index.html: kein Seiten-Reload, direkt ins Admin-Panel springen.
            e.preventDefault();
            guard(loadAdmin);
          }
          return;
        }

        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const { action, id } = btn.dataset;
        const rid = S.route?.id;

        const actions = {
          'goto-landing': () => {
            S.error = '';
            S.screen = 'landing';
            render();
          },
          'enter-owner': () => guard(enterOwnerArea),
          'mode-login': () => {
            S.authMode = 'login';
            S.error = '';
            render();
          },
          'mode-register': () => {
            S.authMode = 'register';
            S.error = '';
            render();
          },
          'submit-auth': () =>
            guard(async () => {
              const u = document.getElementById('username').value.trim();
              const p = document.getElementById('password').value;
              const res = S.authMode === 'login' ? await api.login(u, p) : await api.register(u, p);
              S.user = res.user;
              await loadRoutes();
            }),
          'create-route': () =>
            guard(async () => {
              const name = document.getElementById('new-route-name').value.trim();
              if (!name) throw new Error('Bitte einen Namen eingeben.');
              const route = await api.createRoute(name);
              await openRoute(route.id);
            }),
          open: () => guard(() => openRoute(id)),
          back: () => guard(loadRoutes),
          'use-location': () =>
            guard(async () => {
              snapshotWpDraft();
              const s = await geolocation.requestLocationPermission();
              S.wpDraft.lat = s.lat;
              S.wpDraft.lng = s.lng;
              render(); // Bestätigung sichtbar machen (Position übernommen: ...)
            }),
          'open-map-picker': () =>
            guard(async () => {
              snapshotWpDraft();
              showMapOverlay();
            }),
          'wp-add': () =>
            guard(async () => {
              // Zuerst sichern: bei einem Fehler bleiben alle eingegebenen Werte erhalten
              // (werden erst nach erfolgreichem Anlegen wieder geleert).
              snapshotWpDraft();
              const d = S.wpDraft;
              const hint_text = d.hint.trim();
              const name = d.name.trim();
              if (!hint_text) throw new Error('Bitte einen Hinweis angeben.');
              if (d.lat == null || d.lng == null) {
                throw new Error('Bitte eine Position wählen ("Aktuellen Standort verwenden" oder "Punkt auf Karte auswählen").');
              }
              await api.addWaypoint(rid, { lat: d.lat, lng: d.lng, hint_text, name: name || undefined });
              S.wpDraft = null; // nur bei Erfolg leeren
              await refreshRoute();
            }),
          'wp-del': () => call(() => api.deleteWaypoint(rid, id)),
          'wp-up': () => guard(() => moveWaypoint(id, -1)),
          'wp-down': () => guard(() => moveWaypoint(id, +1)),
          'copy-code': () =>
            guard(async () => {
              await copyToClipboard(S.route.route_code);
              const copyBtn = document.querySelector('[data-action="copy-code"]');
              if (copyBtn) {
                const original = copyBtn.textContent;
                copyBtn.textContent = '✅ Kopiert!';
                setTimeout(() => {
                  copyBtn.textContent = original;
                }, 2000);
              }
            }),
          'code-create': () => call(() => api.createCode(rid)),
          'code-renew': () => call(() => api.renewCode(rid)),
          'code-deactivate': () =>
            guard(async () => {
              await api.deactivateCode(rid);
              S.info = 'Route deaktiviert — der Code lässt niemanden mehr rein.';
              await refreshRoute();
            }),
          'code-activate': () =>
            guard(async () => {
              await api.activateCode(rid);
              S.info = 'Route wieder aktiv — Mitsucher können mit dem Code beitreten.';
              await refreshRoute();
            }),
          start: () =>
            guard(async () => {
              await api.startRoute(rid);
              S.info = 'Route ist jetzt aktiv — Mitsucher können mit dem Code beitreten.';
              await refreshRoute();
            }),
          reset: () => {
            if (confirm('Alle Funde dieser Route zurücksetzen?')) call(() => api.resetRoute(rid));
          },
          'delete-route': () => {
            if (!confirm('Route wirklich löschen? Das kann nicht rückgängig gemacht werden.')) return;
            guard(async () => {
              await api.deleteRoute(rid);
              await loadRoutes();
            });
          },

          // --- Admin (Frage 6) ---
          'admin-route-delete': () => {
            if (!confirm('Diese Route wirklich löschen? Das kann nicht rückgängig gemacht werden.')) return;
            guard(async () => {
              await api.adminDeleteRoute(id);
              await refreshAdmin();
            });
          },
          'admin-user-delete': () => {
            if (!confirm('Diesen Nutzer wirklich löschen? Alle seine Routen werden mitgelöscht — nicht rückgängig zu machen.')) return;
            guard(async () => {
              await api.adminDeleteUser(id);
              await refreshAdmin();
            });
          },
          'admin-code-renew': () =>
            guard(async () => {
              await api.adminRenewCode(id);
              await refreshAdmin();
            }),
          'admin-code-activate': () =>
            guard(async () => {
              await api.adminActivateCode(id);
              await refreshAdmin();
            }),
          'admin-code-deactivate': () =>
            guard(async () => {
              await api.adminDeactivateCode(id);
              await refreshAdmin();
            }),
        };
        actions[action]?.();
      });

      async function moveWaypoint(wpId, delta) {
        const ids = S.route.waypoints.map((w) => w.id);
        const i = ids.indexOf(wpId);
        const j = i + delta;
        if (j < 0 || j >= ids.length) return;
        [ids[i], ids[j]] = [ids[j], ids[i]];
        await api.reorderWaypoints(S.route.id, ids);
        await refreshRoute();
      }

      // Uncaught-Fehler sichtbar machen statt stillschweigend zu verschlucken
      // (macht "Button tut nichts"-artige Bugs ohne Devtools diagnostizierbar).
      window.addEventListener('error', (e) => {
        S.error = e.error?.message || e.message || 'Unerwarteter Fehler.';
        render();
      });
      window.addEventListener('unhandledrejection', (e) => {
        S.error = e.reason?.message || String(e.reason ?? 'Unerwarteter Fehler.');
        render();
      });

      // --- Start: Landing-Screen zuerst (Vertrag: Ersteller vs. Mitsucher aktiv wählen) ---
      render();

      // Session-Status im Hintergrund ermitteln, NUR fürs Nav-Menü (zeigt immer den echten
      // Login-Status, auch bevor "Route erstellen" angeklickt wurde) — überspringt dabei
      // NICHT den Landing-Screen.
      api
        .me()
        .then((me) => {
          S.user = me.user;
          render();
        })
        .catch(() => {
          /* nicht eingeloggt - S.user bleibt null */
        });
    </script>
  </body>
</html>
